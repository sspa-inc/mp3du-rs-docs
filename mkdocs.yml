site_name: mod-PATH3DU Documentation
site_description: 3D particle tracking engine for groundwater flow models
site_url: "https://sspa-inc.github.io/mp3du-rs-docs/"
repo_url: ""  # Set to GitHub repo URL
repo_name: mod-PATH3DU

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      separator: '[\s\-_]+'
  - mkdocstrings:
      handlers:
        python:
          paths: ["docs/_stubs"]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            allow_inspection: false
            show_if_no_docstring: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
  #- gen-files:
  #    scripts:
  #      - scripts/gen_api_docs.py
  - section-index
  - social:
      cards_layout_options:
        background_color: "#1a237e"
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - admonition
  - md_in_html
  - toc:
      permalink: true
  - def_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - assets/javascripts/katex.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

